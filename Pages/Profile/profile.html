<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>

  <link rel="stylesheet" href="./profileStyleSheet.css">
  <script type="module" src="./profileLogic.js" defer></script>
</head>
<body>
  <header>
    <nav>
      <a id="homeButton" href="../../index.html"><img src="../../globalFiles/home.png"></a>
      <a id="profileButton" href="#">Profile</a>
      <a id="loginButton" href="../Auth Pages/signin.html">SignIn/SignUp</a>
      <a id="leaderboardButton" href="../Leaderboard/leaderboard.html">Leaderboard</a>
    </nav>
  </header>

  <div class="profileContainer">
    <div class="profileDetailsContainer">
      <img class="profilePicture" src="./defauleProfilePicture.png">
      <p id="username"></p>
      <p id="userID"></p>
      <p id="accountCreated"></p>
      <a id="logoutButton" href="../../index.html">LOGOUT</a>
    </div>
    <div class="gameDetailsContainer">
      <h1>Personal High Scores</h1>
      <div class="gameContainer">
        <a class="gameCard">
          <img src="../../games/TicTacToe/icons/gameIcon.png">
          <h2>Tic-Tac-Toe</h2>
          <p id="TTTscore"></p>
        </a>
        <a class="gameCard">
          <img src="../../games/RockPaperScissors/icons/gameIcon.png">
          <h2>Rock Paper Scissors</h2>
          <p id="RPSscore"></p>
        </a>
        <a class="gameCard">
          <img src="../../games/MatchTheCards/icons/gameIcon.png">
          <h2>Match the Cards</h2>
          <p id="MTCscore"></p>
        </a>
        <a class="gameCard">
          <img src="../../games/MemoryGame/icons/gameIcon.png">
          <h2>Memory Game</h2>
          <p id="MGscore"></p>
        </a>
      </div>
    </div>
  </div>

  <footer>
    &copy COPYRIGHTS RESERVED BY THE NATION OF CROATIA! DO NOT DISTRIBUTE!
  </footer>
</body>
</html>
