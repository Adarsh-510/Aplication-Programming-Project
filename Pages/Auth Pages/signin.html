<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignIn</title>

  <link rel="stylesheet" href="./authPagesStyleSheet.css">
  <script type="module" src="./authenticate.js" defer></script>
  <script type="module" src="../../globalFiles/baseLogic.js" defer></script>
</head>
<body>
  <header>
    <nav>
      <a id="homeButton" href="../../index.html"><img src="../../globalFiles/home.png"></a>
      <a id="profileButton" href="../Profile/profile.html">Profile</a>
      <a id="loginButton" href="#">SignIn/SignUp</a>
      <a id="leaderboardButton" href="../Leaderboard/leaderboard.html">Leaderboard</a>
    </nav>

    <h1>SignIn</h1>
    <p>SignIn to an already existing account.</p>
  </header>

  <div class="authForm">
    <div class="authOptions">
      <a href="#">SignIn</a>
      <a href="./signup.html" id="notCurrentSelection" style="border-top-left-radius: 0px; border-bottom-right-radius: 0px;">SignUp</a>
    </div>

    <form id="signin">
      <label for="user">User ID or Username</label><br>
      <input type="text" id="user" placeholder="BT25CSE170 / Adarsh Jain" required><br>
      <label for="password">Password</label><br>
      <input type="password" id="password" placeholder="********" required><br>

      <input class="submitBtn" type="submit" value="SignIn">

      <p id="error"></p>
    </form>
  </div>

  <footer>
    &copy COPYRIGHTS RESERVED BY THE NATION OF CROATIA! DO NOT DISTRIBUTE!
  </footer>
</body>
</html>
