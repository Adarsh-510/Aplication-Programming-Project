<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignUp</title>

  <link rel="stylesheet" href="./authPagesStyleSheet.css">
  <script type="module" src="./authenticate.js" defer></script>
</head>
<body>
  <header>
    <nav>
      <a id="homeButton" href="../../index.html"><img src="../../globalFiles/home.png"></a>
      <a id="profileButton" href="../Profile/profile.html">Profile</a>
      <a id="loginButton" href="#">SignIn/SignUp</a>
      <a id="leaderboardButton" href="../Leaderboard/leaderboard.html">Leaderboard</a>
    </nav>

    <h1>SignUp</h1>
    <p>SignUp for a new account.</p>
  </header>

  <div class="authForm">
    <div class="authOptions">
      <a href="./signin.html" id="notCurrentSelection" style="border-top-right-radius: 0px; border-bottom-left-radius: 0px;">SignIn</a>
      <a href="#">SignUp</a>
    </div>

    <form id="signup">
      <label for="userID">User ID (collage id)</label><br>
      <input type="text" id="userID"
             placeholder="BT25CSE170" 
             oninput="this.value = this.value.toUpperCase()"
             pattern="^BT[0-9]{2}[A-Z]{3}[0-9]{3}$"
             required><br>
      <label for="username">Username</label><br>
      <input type="text" id="username" placeholder="Adarsh Jain" required maxlength="50"><br>
      <label for="password">Password</label><br>
      <input type="password" id="password" placeholder="********" required minlength="8" maxlength="25"><br>
      <label for="repassword">Retype Password</label><br>
      <input type="password" id="repassword" placeholder="********" required><br>

      <input class="submitBtn" type="submit" value="SignUp">
    </form>
  </div>

  <footer>
    &copy COPYRIGHTS RESERVED BY THE NATION OF CROATIA! DO NOT DISTRIBUTE!
  </footer>
</body>
</html>
