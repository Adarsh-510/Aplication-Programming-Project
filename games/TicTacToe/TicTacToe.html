<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="../../baseStyleSheet.css">
  <link rel="stylesheet" href="TicTacToeStyleSheet.css">
</head>
<body>
  <header>
    <nav>
      <a id="homeButton" href="../../index.html">🏠</a>
      <a id="profileButton" href="#">Profile</a>
      <a id="loginButton" href="#">Login/Signup</a>
      <a id="leaderboardButton" href="#">Leaderboard</a>
    </nav>

    <h1>TIC-TAC-TOE</h1>
    <p id="score">SCORE: 0</p>
  </header>

  <div id="gameEndOverlay">
    <div class="overlayBackground"></div>
    <div class="gameOutcome">
      <h2>PLAYER WINS!!</h2>
      <div>
        <div class="overlayButton" id="playAgainButton">Play again</div>
        <a class="overlayButton" href="../../index.html">Return to home</a>
      </div>
    </div>
  </div>

  <div class="gameContainer">
    <div class="cell" id="cell00"></div>
    <div class="cell" id="cell01"></div>
    <div class="cell" id="cell02"></div>
    <div class="cell" id="cell10"></div>
    <div class="cell" id="cell11"></div>
    <div class="cell" id="cell12"></div>
    <div class="cell" id="cell20"></div>
    <div class="cell" id="cell21"></div>
    <div class="cell" id="cell22"></div>
  </div>
  <h2 id="infoLine"></h2>

  <footer>
    COPYRIGHTS RESERVED BY THE NATION OF CROATIA! DO NOT DISTRIBUTE!
  </footer>

  <script src="TicTacToeLogic.js"></script>
</body>
</html>
